<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 번호 추첨기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #000000;
    --on-primary: #ffffff;
    --ink: #000000;
    --body: #5e5e5e;
    --mute: #afafaf;
    --hairline-mid: #4b4b4b;
    --canvas: #ffffff;
    --canvas-soft: #efefef;
    --canvas-softer: #f3f3f3;
    --surface-pressed: #e2e2e2;
    --black-elevated: #282828;

    --display-font: 'Inter', 'UberMove', system-ui, Helvetica Neue, Arial, sans-serif;
    --text-font: 'Inter', 'UberMoveText', system-ui, Helvetica Neue, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--text-font);
    background: var(--canvas);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  .nav-bar {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 16px 32px;
    background: var(--canvas);
  }
  .nav-bar .logo {
    font-family: var(--display-font);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0;
  }

  .hero {
    width: 100%;
    max-width: 1200px;
    padding: 32px 32px 8px;
    text-align: center;
  }
  .hero h1 {
    font-family: var(--display-font);
    font-weight: 700;
    font-size: 36px;
    line-height: 44px;
    margin: 0 0 8px;
  }
  .hero p {
    font-family: var(--text-font);
    font-weight: 400;
    font-size: 16px;
    line-height: 24px;
    color: var(--body);
    margin: 0;
  }

  .card {
    background: var(--canvas);
    border-radius: 16px;
    padding: 24px;
    box-shadow: rgba(0, 0, 0, 0.12) 0px 4px 16px 0px;
    width: 100%;
    max-width: 480px;
    margin: 32px 16px;
  }

  .balls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 8px 0 24px;
    min-height: 60px;
  }
  .ball {
    width: 52px;
    height: 52px;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--text-font);
    font-weight: 700;
    font-size: 18px;
  }
  .ball.rolling {
    background: var(--canvas-soft);
    color: var(--mute);
  }
  .ball.settle {
    animation: settle 0.4s cubic-bezier(.36,1.6,.4,1);
  }
  @keyframes settle {
    0% { transform: scale(1.25); }
    60% { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  .ball.bonus {
    background: var(--canvas);
    color: var(--ink);
    border: 2px solid var(--ink);
  }
  .ball.bonus.rolling {
    background: var(--canvas-soft);
    color: var(--mute);
    border: 2px solid var(--surface-pressed);
  }
  .plus-sign {
    font-family: var(--display-font);
    font-weight: 700;
    font-size: 20px;
    color: var(--mute);
    display: flex;
    align-items: center;
    padding: 0 2px;
  }

  /* Grayscale-only tone scale standing in for the 5 lotto ranges — no accent colours per brand rule */
  .t1 { background: var(--mute);          color: var(--ink); }
  .t2 { background: var(--hairline-mid);  color: var(--on-primary); }
  .t3 { background: var(--body);          color: var(--on-primary); }
  .t4 { background: var(--black-elevated);color: var(--on-primary); }
  .t5 { background: var(--primary);       color: var(--on-primary); }

  button.draw-btn {
    display: block;
    width: 100%;
    padding: 12px 12px;
    font-family: var(--text-font);
    font-size: 16px;
    font-weight: 500;
    line-height: 20px;
    border: none;
    border-radius: 9999px;
    background: var(--primary);
    color: var(--on-primary);
    cursor: pointer;
    transition: background 0.15s;
  }
  button.draw-btn:hover { background: var(--black-elevated); }
  button.draw-btn:active { background: var(--surface-pressed); color: var(--ink); }
  button.draw-btn:disabled {
    background: var(--surface-pressed);
    color: var(--mute);
    cursor: default;
  }

  .history {
    margin-top: 24px;
    width: 100%;
    border-top: 1px solid var(--surface-pressed);
    padding-top: 16px;
  }
  .history h2 {
    font-family: var(--text-font);
    font-size: 12px;
    font-weight: 400;
    line-height: 20px;
    color: var(--mute);
    margin: 0 0 8px;
    text-transform: none;
  }
  .history-item {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .mini-ball {
    width: 26px;
    height: 26px;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--text-font);
    font-size: 12px;
    font-weight: 500;
  }
  .mini-ball.bonus {
    background: var(--canvas);
    color: var(--ink);
    border: 2px solid var(--ink);
  }
  .mini-plus {
    font-family: var(--display-font);
    font-weight: 700;
    font-size: 12px;
    color: var(--mute);
  }
</style>
</head>
<body>
  <div class="nav-bar"><span class="logo">LOTTO</span></div>

  <div class="hero">
    <h1>번호를 뽑아보세요</h1>
    <p>1부터 45까지, 서로 다른 번호 6개와 보너스 번호 1개를 추첨합니다.</p>
  </div>

  <div class="card">
    <div class="balls" id="balls"></div>
    <button class="draw-btn" id="drawBtn">번호 뽑기</button>

    <div class="history" id="history"></div>
  </div>

<script>
  function toneClass(n) {
    if (n <= 10) return 't1';
    if (n <= 20) return 't2';
    if (n <= 30) return 't3';
    if (n <= 40) return 't4';
    return 't5';
  }

  function drawNumbers() {
    const nums = new Set();
    while (nums.size < 6) {
      nums.add(Math.floor(Math.random() * 45) + 1);
    }
    const main = Array.from(nums).sort((a, b) => a - b);

    let bonus;
    do {
      bonus = Math.floor(Math.random() * 45) + 1;
    } while (nums.has(bonus));

    return { main, bonus };
  }

  function renderHistoryRow(container, main, bonus) {
    container.innerHTML = '';
    main.forEach(n => {
      const ball = document.createElement('div');
      ball.className = 'mini-ball ' + toneClass(n);
      ball.textContent = n;
      container.appendChild(ball);
    });
    const plus = document.createElement('span');
    plus.className = 'mini-plus';
    plus.textContent = '+';
    container.appendChild(plus);
    const bonusBall = document.createElement('div');
    bonusBall.className = 'mini-ball bonus';
    bonusBall.textContent = bonus;
    container.appendChild(bonusBall);
  }

  const ballsEl = document.getElementById('balls');
  const historyEl = document.getElementById('history');
  const drawBtn = document.getElementById('drawBtn');
  const history = [];

  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  // Spins random numbers on a ball like a real draw machine, then locks in the real value.
  async function revealBall(ballEl, finalNumber) {
    const spinTimer = setInterval(() => {
      ballEl.textContent = Math.floor(Math.random() * 45) + 1;
    }, 60);

    await sleep(550);

    clearInterval(spinTimer);
    ballEl.textContent = finalNumber;
    ballEl.classList.remove('rolling');
    if (!ballEl.classList.contains('bonus')) {
      ballEl.classList.add(toneClass(finalNumber));
    }
    ballEl.classList.add('settle');
  }

  async function draw() {
    drawBtn.disabled = true;
    drawBtn.textContent = '추첨 중...';

    const { main, bonus } = drawNumbers();

    ballsEl.innerHTML = '';
    const mainEls = main.map(() => {
      const ball = document.createElement('div');
      ball.className = 'ball rolling';
      ball.textContent = '-';
      ballsEl.appendChild(ball);
      return ball;
    });

    const plus = document.createElement('span');
    plus.className = 'plus-sign';
    plus.textContent = '+';
    ballsEl.appendChild(plus);

    const bonusEl = document.createElement('div');
    bonusEl.className = 'ball bonus rolling';
    bonusEl.textContent = '-';
    ballsEl.appendChild(bonusEl);

    for (let i = 0; i < main.length; i++) {
      await revealBall(mainEls[i], main[i]);
    }
    await revealBall(bonusEl, bonus);

    history.unshift({ main, bonus });
    if (history.length > 5) history.pop();

    historyEl.innerHTML = '<h2>최근 기록</h2>';
    history.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'history-item';
      renderHistoryRow(row, entry.main, entry.bonus);
      historyEl.appendChild(row);
    });

    drawBtn.disabled = false;
    drawBtn.textContent = '번호 뽑기';
  }

  drawBtn.addEventListener('click', draw);
  draw();
</script>
</body>
</html>
